; Meson cross-file for CH32V003F4U6 (RISC-V RV32EC, 16 KB flash, 2 KB SRAM).
; Toolchain: xPack riscv-none-elf-gcc (https://xpack.github.io/dev-tools/riscv-none-elf-gcc/).

[constants]
# -march=rv32ec_zmmul = RV32E + C (compressed) + Zmmul (multiply, no divide).
common_flags = ['-march=rv32ec_zmmul', '-mabi=ilp32e', '-msmall-data-limit=8', '-mno-save-restore', '-Os', '-g3']

[binaries]
c       = ['riscv-none-elf-gcc']
cpp     = ['riscv-none-elf-g++']
ar      = 'riscv-none-elf-ar'
strip   = 'riscv-none-elf-strip'
objcopy = 'riscv-none-elf-objcopy'
objdump = 'riscv-none-elf-objdump'
size    = 'riscv-none-elf-size'

[built-in options]
c_args        = common_flags
cpp_args      = common_flags
c_link_args   = common_flags
cpp_link_args = common_flags

[properties]
needs_exe_wrapper = true

[host_machine]
system     = 'none'
cpu_family = 'riscv32'
cpu        = 'rv32ec'
endian     = 'little'
